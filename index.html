<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Frequency — AI Ethics & Literacy</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0E1620;
  --surface: #162030;
  --surface2: #1C2A3A;
  --surface3: #223040;
  --border: #2A3F52;
  --border2: #354E64;
  --text: #E8EFF5;
  --soft: #7A9BB5;
  --muted: #4A6880;
  --amber: #E8923A;
  --amber-dim: #3A2510;
  --green: #4CAF82;
  --green-dim: #122A1E;
  --red: #D05A48;
  --red-dim: #2A1210;
  --blue: #4A8FD4;
  --blue-dim: #0E2238;
  --purple: #8A6ED4;
  --r: 6px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 0 80px;
}

/* ── HEADER ── */
.site-header {
  width: 100%;
  border-bottom: 1px solid var(--border);
  padding: 18px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: rgba(14,22,32,0.96);
  backdrop-filter: blur(8px);
  z-index: 100;
}
.logo {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.02em;
}
.logo span { color: var(--amber); }
.header-meta {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.progress-header {
  display: flex;
  align-items: center;
  gap: 12px;
}
.progress-pips {
  display: flex;
  gap: 5px;
}
.pip {
  width: 28px;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  transition: background 0.4s ease;
}
.pip.done { background: var(--amber); }
.pip.active { background: var(--amber); opacity: 0.5; }

/* ── MAIN WRAP ── */
.main {
  width: 100%;
  max-width: 720px;
  padding: 0 20px;
  margin-top: 48px;
}

/* ── CARDS ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 40px 44px;
  animation: fadeUp 0.35s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.card + .card { margin-top: 16px; }

/* ── INTRO ── */
.intro-eyebrow {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--amber);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.intro-eyebrow::before {
  content: '';
  width: 20px;
  height: 1px;
  background: var(--amber);
}
.intro-title {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 38px;
  line-height: 1.15;
  letter-spacing: -0.02em;
  margin-bottom: 20px;
}
.intro-title em { color: var(--amber); font-style: normal; }
.intro-body {
  font-size: 15.5px;
  line-height: 1.7;
  color: var(--soft);
  margin-bottom: 28px;
}
.intro-body strong { color: var(--text); font-weight: 600; }
.callout-block {
  background: var(--surface2);
  border-left: 3px solid var(--amber);
  border-radius: 0 var(--r) var(--r) 0;
  padding: 16px 20px;
  margin-bottom: 28px;
  font-size: 14px;
  color: var(--soft);
  line-height: 1.65;
}
.role-select-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.role-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 32px;
}
.role-btn {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  padding: 16px 12px;
  cursor: pointer;
  text-align: center;
  transition: all 0.18s ease;
  color: var(--text);
  font-family: 'Inter', sans-serif;
}
.role-btn:hover { border-color: var(--amber); background: var(--amber-dim); }
.role-btn.selected { border-color: var(--amber); background: var(--amber-dim); }
.role-icon { font-size: 22px; margin-bottom: 8px; }
.role-name { font-size: 13px; font-weight: 600; }
.role-sub { font-size: 11.5px; color: var(--soft); margin-top: 3px; }
.how-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 32px;
}
.how-item {
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
  background: var(--surface2);
}
.how-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--amber);
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}
.how-desc { font-size: 12.5px; color: var(--soft); line-height: 1.5; }
.start-btn {
  width: 100%;
  background: var(--amber);
  color: #1A0E04;
  border: none;
  border-radius: var(--r);
  padding: 16px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 0.02em;
  cursor: pointer;
  transition: opacity 0.15s;
}
.start-btn:hover { opacity: 0.9; }
.start-btn:disabled { opacity: 0.35; cursor: default; }

/* ── VOCAB ROUND ── */
.round-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--amber);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.round-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
.term-display {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 42px;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
  line-height: 1.1;
}
.term-context {
  font-size: 13.5px;
  color: var(--soft);
  margin-bottom: 32px;
  line-height: 1.5;
}
.choices-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.choice {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  padding: 16px 18px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-size: 14.5px;
  color: var(--text);
  text-align: left;
  line-height: 1.5;
  transition: border-color 0.15s, background 0.15s, transform 0.1s;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.choice:hover:not(:disabled) { border-color: var(--amber); background: var(--amber-dim); transform: translateX(2px); }
.choice:disabled { cursor: default; }
.choice.correct { border-color: var(--green); background: var(--green-dim); }
.choice.wrong { border-color: var(--red); background: var(--red-dim); }
.choice-key {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  flex-shrink: 0;
  padding-top: 2px;
}
.vocab-result {
  margin-top: 20px;
  padding: 20px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  animation: fadeUp 0.3s ease;
}
.result-status {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 10px;
  font-weight: 600;
}
.result-status.ok { color: var(--green); }
.result-status.no { color: var(--red); }
.result-body {
  font-size: 14px;
  color: var(--soft);
  line-height: 1.7;
}
.result-body strong { color: var(--text); }
.next-btn {
  margin-top: 20px;
  background: var(--surface3);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 13px 22px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 14px;
  color: var(--text);
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.next-btn:hover { border-color: var(--amber); background: var(--amber-dim); color: var(--amber); }

/* ── SCENARIO ── */
.scenario-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 20px;
}
.scenario-who {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 10px;
  white-space: nowrap;
}
.scenario-term-badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--amber);
  border: 1px solid var(--amber-dim);
  border-radius: 20px;
  padding: 4px 10px;
  background: var(--amber-dim);
  white-space: nowrap;
}
.scenario-title {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 22px;
  line-height: 1.25;
  margin-bottom: 16px;
}
.scenario-scene {
  background: var(--surface2);
  border-left: 3px solid var(--border2);
  border-radius: 0 var(--r) var(--r) 0;
  padding: 18px 20px;
  font-size: 14.5px;
  color: var(--soft);
  line-height: 1.75;
  margin-bottom: 28px;
  font-style: italic;
}
.tension-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.scenario-choices {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.s-choice {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  padding: 18px 20px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  color: var(--text);
  text-align: left;
  line-height: 1.6;
  transition: all 0.18s ease;
  display: flex;
  gap: 14px;
}
.s-choice:hover:not(:disabled) { border-color: var(--amber); background: var(--amber-dim); }
.s-choice:disabled { cursor: default; }
.s-choice.selected-deep { border-color: var(--green); background: var(--green-dim); }
.s-choice.selected-mid  { border-color: var(--blue); background: var(--blue-dim); }
.s-choice.selected-low  { border-color: var(--red); background: var(--red-dim); }
.s-key {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  flex-shrink: 0;
  padding-top: 1px;
}

/* ── FEEDBACK ── */
.feedback-card {
  margin-top: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  animation: fadeUp 0.3s ease;
}
.feedback-top {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
}
.depth-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 6px;
}
.depth-deep { color: var(--green); }
.depth-mid  { color: var(--blue); }
.depth-low  { color: var(--red); }
.feedback-choice-echo {
  font-size: 13px;
  color: var(--muted);
  font-style: italic;
}
.feedback-choice-echo span { color: var(--soft); font-style: normal; }
.feedback-body-wrap { padding: 20px 24px; }
.feedback-main {
  font-size: 14.5px;
  color: var(--soft);
  line-height: 1.75;
  margin-bottom: 20px;
}
.feedback-main strong { color: var(--text); }
.tension-reveal {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px 18px;
  margin-bottom: 20px;
}
.tension-reveal-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--amber);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.tension-reveal-body {
  font-size: 13.5px;
  color: var(--soft);
  line-height: 1.65;
}
.reflection-wrap {
  margin-bottom: 20px;
}
.reflection-label {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 8px;
}
textarea.reflect {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 12px 14px;
  font-family: 'Inter', sans-serif;
  font-size: 13.5px;
  color: var(--text);
  resize: none;
  height: 80px;
  line-height: 1.6;
}
textarea.reflect:focus { outline: none; border-color: var(--amber); }
textarea.reflect::placeholder { color: var(--muted); }
.reflect-hint {
  font-size: 11.5px;
  color: var(--muted);
  margin-top: 6px;
  font-style: italic;
}

/* ── DEPTH METER ── */
.depth-meter-wrap {
  margin-bottom: 20px;
}
.depth-meter-heads {
  display: flex;
  justify-content: space-between;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.depth-track {
  height: 6px;
  background: var(--surface3);
  border-radius: 3px;
  overflow: hidden;
  position: relative;
}
.depth-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
}

/* ── SUMMARY ── */
.summary-eyebrow {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--amber);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 16px;
}
.summary-persona-row {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 20px;
}
.persona-icon-big { font-size: 48px; flex-shrink: 0; }
.summary-title {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 28px;
  letter-spacing: -0.02em;
  line-height: 1.2;
  margin-bottom: 6px;
}
.summary-subtitle { font-size: 14px; color: var(--soft); line-height: 1.6; }
.summary-blurb {
  font-size: 15px;
  color: var(--soft);
  line-height: 1.75;
  margin-bottom: 24px;
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 32px;
}
.stat-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 18px 16px;
  text-align: center;
}
.stat-num {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 32px;
  line-height: 1;
  margin-bottom: 6px;
  color: var(--amber);
}
.stat-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.section-head {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 16px;
  margin-bottom: 12px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.glossary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 32px;
}
.g-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 16px;
}
.g-term {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 14px;
  color: var(--amber);
  margin-bottom: 6px;
}
.g-def { font-size: 12.5px; color: var(--soft); line-height: 1.55; }
.case-log { display: flex; flex-direction: column; gap: 8px; margin-bottom: 32px; }
.log-row {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 16px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
}
.log-left { flex: 1; }
.log-scenario { font-size: 12.5px; color: var(--muted); margin-bottom: 4px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.04em; }
.log-choice { font-size: 13.5px; color: var(--soft); line-height: 1.4; }
.log-badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 4px 9px;
  border-radius: 12px;
  flex-shrink: 0;
  font-weight: 600;
}
.badge-deep { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }
.badge-mid  { background: var(--blue-dim);  color: var(--blue);  border: 1px solid var(--blue); }
.badge-low  { background: var(--red-dim);   color: var(--red);   border: 1px solid var(--red); }
.closing-note {
  background: var(--surface2);
  border-left: 3px solid var(--amber);
  border-radius: 0 var(--r) var(--r) 0;
  padding: 18px 20px;
  font-size: 14px;
  color: var(--soft);
  line-height: 1.75;
  margin-bottom: 28px;
}
.restart-btn {
  width: 100%;
  background: var(--surface2);
  border: 1.5px solid var(--border2);
  border-radius: var(--r);
  padding: 15px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 14px;
  color: var(--text);
  cursor: pointer;
  transition: all 0.18s ease;
}
.restart-btn:hover { border-color: var(--amber); color: var(--amber); }
.kbd { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); background: var(--surface3); border: 1px solid var(--border); border-radius: 3px; padding: 2px 5px; }
.kbd-hint { font-size: 11.5px; color: var(--muted); margin-top: 10px; }

@media (max-width: 600px) {
  .card { padding: 24px 20px; }
  .role-grid, .how-grid { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(3,1fr); }
  .glossary-grid { grid-template-columns: 1fr; }
  .term-display { font-size: 30px; }
  .intro-title { font-size: 28px; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="logo">The <span>Frequency</span></div>
  <div class="progress-header">
    <div class="progress-pips" id="pips"></div>
    <div class="header-meta" id="headerMeta">AI Ethics & Literacy</div>
  </div>
</header>

<div class="main" id="main"></div>

<script>
// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────
const VOCAB = [
  {
    term: "Algorithmic Bias",
    context: "as it appears in educational AI tools",
    defs: [
      { text: "When an AI system produces results that systematically favor or disadvantage groups based on patterns in its training data — not because a human intentionally programmed it that way.", correct: true },
      { text: "A deliberate decision by an AI company to make their software prefer certain types of students.", correct: false },
      { text: "The tendency for students to prefer AI tools that give them easier answers.", correct: false },
    ],
    explanation: "<strong>Algorithmic bias</strong> is not intentional discrimination — it is the downstream effect of training data that reflects historical inequities. An AI grading tool trained mostly on essays from wealthy schools may systematically score differently for students whose writing style or cultural references differ from that training set. This is not a bug a developer chose; it is a structural problem that requires structural awareness."
  },
  {
    term: "Cognitive Offloading",
    context: "in the context of student learning",
    defs: [
      { text: "Using technology to outsource mental work — like calculations, memory, or reasoning — that your brain would otherwise do.", correct: true },
      { text: "The process of downloading AI tools to a personal device for offline use.", correct: false },
      { text: "When a student copies work directly from the internet without paraphrasing.", correct: false },
    ],
    explanation: "<strong>Cognitive offloading</strong> is not inherently bad — humans have offloaded to books, calculators, and spell-checkers for generations. The educational question is: which cognitive tasks are worth doing yourself because the struggle is the learning? Using AI to draft a first paragraph you immediately replace with your own thinking is different from submitting the AI paragraph as your work. The line lives in whether your own thinking was ever engaged."
  },
  {
    term: "Hallucination",
    context: "when discussing AI-generated content",
    defs: [
      { text: "When an AI generates information that sounds confident and authoritative but is factually incorrect or entirely fabricated.", correct: true },
      { text: "A creative mode in AI tools that allows them to produce artistic or fictional content.", correct: false },
      { text: "The visual distortion that occurs when AI image generators produce surreal or dreamlike imagery.", correct: false },

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderPips() {
  const total = SCENARIOS.length;
  const pips = document.getElementById('pips');
  const meta = document.getElementById('headerMeta');
  if (!pips) return;
  if (phase === 'intro') { pips.innerHTML = ''; meta.textContent = 'AI Ethics & Literacy'; return; }
  if (phase === 'summary') { meta.textContent = 'Signal Report'; }
  else { meta.textContent = `Round ${scenarioIndex + 1} of ${total}`; }
  pips.innerHTML = Array.from({ length: total }, (_, i) => {
    let cls = 'pip';
    if (i < scenarioIndex) cls += ' done';
    else if (i === scenarioIndex && phase !== 'summary') cls += ' active';
    return `<div class="${cls}"></div>`;
  }).join('');
}

        <div class="how-grid">
          <div class="how-item"><div class="how-num">01 · DEFINE</div><div class="how-desc">Match a key AI literacy term to its correct definition. Context matters.</div></div>
          <div class="how-item"><div class="how-num">02 · DECIDE</div><div class="how-desc">Face a real ethical dilemma — student, teacher, or administrator — and choose a path.</div></div>
          <div class="how-item"><div class="how-num">03 · REFLECT</div><div class="how-desc">Read the reasoning behind each choice. Write a sentence. Think out loud.</div></div>
        </div>
      </div>
      <button class="start-btn" id="startBtn" onclick="startGame()" ${selectedRole ? '' : 'disabled'}>
        Begin — Round 1 of ${SCENARIOS.length}
      </button>
    </div>
  `);
}

function selectRole(role) {
  selectedRole = role;
  renderIntro();
}

// ─────────────────────────────────────────────
// VOCAB
// ─────────────────────────────────────────────
function renderVocab() {
  phase = 'vocab';
  vocabAnswered = false;
  const v = vocabDeck[vocabIndex];
  const shuffled = shuffle(v.defs.map((d, i) => ({ ...d, origIdx: i })));
  renderPips();
  setMain(`
    <div class="card">
      <div class="round-label">Round ${scenarioIndex + 1} · Vocabulary</div>
      <div class="term-display">${v.term}</div>
      <div class="term-context">As used in the context of: ${v.context}</div>
      <div class="choices-list" id="vocabChoices">
        ${shuffled.map((d, i) => `
          <button class="choice" onclick="answerVocab(${d.correct})" id="vc${i}">
            <span class="choice-key">${String.fromCharCode(65 + i)}</span>
            <span>${d.text}</span>
          </button>
        `).join('')}
      </div>
      <div id="vocabResult"></div>
    </div>
  `);
}

function answerVocab(correct) {
  if (vocabAnswered) return;
  vocabAnswered = true;
  if (correct) stats.vocabCorrect++;
  const v = vocabDeck[vocabIndex];
  const btns = document.querySelectorAll('.choice');
  btns.forEach(b => b.disabled = true);

  // highlight correct
  document.querySelectorAll('.choice').forEach((b, i) => {
    const txt = b.querySelector('span:last-child').textContent;
    const match = v.defs.find(d => d.text === txt);
    if (match && match.correct) b.classList.add('correct');
  });
  if (!correct) {
    // find clicked button — the one that triggered this
    document.querySelectorAll('.choice').forEach(b => {
      const txt = b.querySelector('span:last-child').textContent;
      const match = v.defs.find(d => d.text === txt);
      if (match && !match.correct) b.classList.add('wrong');
    });
  }

  document.getElementById('vocabResult').innerHTML = `
    <div class="vocab-result">
      <div class="result-status ${correct ? 'ok' : 'no'}">${correct ? '✓ Tuned in' : '✗ Off frequency'}</div>
      <div class="result-body">${v.explanation}</div>
    </div>
    <button class="next-btn" onclick="goToScenario()">
      Continue to the dilemma &nbsp;→
    </button>
    <div class="kbd-hint">or press <kbd class="kbd">Enter</kbd></div>
  `;
}

// ─────────────────────────────────────────────
// SCENARIO
// ─────────────────────────────────────────────
function renderScenario() {
  phase = 'scenario';
  scenarioAnswered = false;
  const s = scenarioDeck[scenarioIndex];
  renderPips();
  setMain(`
    <div class="card">
      <div class="round-label">Round ${scenarioIndex + 1} · Dilemma</div>
      <div class="scenario-header">
        <div class="scenario-who">👤 ${s.who}</div>
        <div class="scenario-term-badge">${s.term}</div>
      </div>
      <div class="scenario-title">${s.title}</div>
      <div class="scenario-scene">${s.scene}</div>
      <div class="tension-label">Core tensions: ${s.tensions}</div>
      <div class="scenario-choices" id="scenChoices">
        ${s.choices.map((c, i) => `
          <button class="s-choice" onclick="chooseScenario(${i})" id="sc${i}">
            <span class="s-key">${String.fromCharCode(65 + i)}</span>
            <span>${c.text}</span>
          </button>
        `).join('')}
      </div>
      <div id="scenFeedback"></div>
    </div>
  `);
}

function chooseScenario(idx) {
  if (scenarioAnswered) return;
  scenarioAnswered = true;
  const s = scenarioDeck[scenarioIndex];
  const c = s.choices[idx];

  if (c.depth === 'deep') stats.deepChoices++;
  log.push({ scenario: s.title, who: s.who, choiceText: c.text, depth: c.depth, label: c.label });

  const btns = document.querySelectorAll('.s-choice');
  btns.forEach((b, i) => {
    b.disabled = true;
    const d = s.choices[i].depth;
    b.classList.add(`selected-${d}`);
  });

  const depthMeta = {
    deep: { label: 'Deep Reasoning', color: 'var(--green)', cls: 'depth-deep', fill: 90 },
    mid:  { label: 'Partial Reasoning', color: 'var(--blue)',  cls: 'depth-mid',  fill: 55 },
    low:  { label: 'Surface Reasoning', color: 'var(--red)',   cls: 'depth-low',  fill: 18 },
  }[c.depth];

  document.getElementById('scenFeedback').innerHTML = `
    <div class="feedback-card">
      <div class="feedback-top">
        <div class="depth-label ${depthMeta.cls}">${depthMeta.label} — ${c.label}</div>
        <div class="feedback-choice-echo">You chose: <span>${c.text}</span></div>
      </div>
      <div class="feedback-body-wrap">
        <div class="depth-meter-wrap">
          <div class="depth-meter-heads"><span>Surface</span><span>Deep</span></div>
          <div class="depth-track">
            <div class="depth-fill" id="dfill" style="width:0%;background:${depthMeta.color};"></div>
          </div>
        </div>
        <div class="feedback-main">${c.feedback}</div>
        <div class="tension-reveal">
          <div class="tension-reveal-label">The core tension</div>
          <div class="tension-reveal-body">${c.tension}</div>
        </div>
        <div class="reflection-wrap">
          <div class="reflection-label">Optional: How would you explain this choice to someone who chose differently?</div>
          <textarea class="reflect" id="reflectBox" placeholder="Write a sentence or two — just for yourself. Not saved, not graded."></textarea>
          <div class="reflect-hint">The point is not the answer. It's noticing what you actually think when you have to say it out loud.</div>
        </div>
        <button class="next-btn" onclick="nextRound()">
          ${scenarioIndex < scenarioDeck.length - 1 ? 'Next round →' : 'See your signal report →'}
        </button>
        <div class="kbd-hint">or press <kbd class="kbd">Enter</kbd></div>
      </div>
    </div>
  `;
  requestAnimationFrame(() => {
    const fill = document.getElementById('dfill');
    if (fill) fill.style.width = depthMeta.fill + '%';
  });
}

// ─────────────────────────────────────────────
// FLOW CONTROL
// ─────────────────────────────────────────────
function startGame() {
  if (!selectedRole) return;
  buildDecks();
  // sort decks so selected role appears first
  const roleMap = { student: 'Student', teacher: 'Teacher', admin: 'Administrator' };
  const roleLabel = roleMap[selectedRole];
  scenarioDeck = [
    ...scenarioDeck.filter(s => s.who === roleLabel),
    ...scenarioDeck.filter(s => s.who !== roleLabel),
  ];
  vocabIndex = 0;
  scenarioIndex = 0;
  stats = { vocabCorrect: 0, deepChoices: 0, reflections: 0 };
  log = [];
  renderVocab();
}

function goToScenario() {
  renderScenario();
}

function nextRound() {
  const box = document.getElementById('reflectBox');
  if (box && box.value.trim().length > 5) stats.reflections++;
  if (scenarioIndex < scenarioDeck.length - 1) {
    scenarioIndex++;
    vocabIndex = Math.min(vocabIndex + 1, vocabDeck.length - 1);
    renderVocab();
  } else {
    renderSummary();
  }
}

// ─────────────────────────────────────────────
// SUMMARY
// ─────────────────────────────────────────────
function getPersona() {
  const deep = stats.deepChoices;
  if (deep >= 7) return { icon: '🔬', title: 'Systems Thinker', subtitle: 'You consistently reasoned past the immediate situation.', blurb: 'You showed a consistent ability to see the structural dimension of individual choices — to ask not just "what is the right thing to do here" but "what does this choice say about the system and what it enables or prevents." That\'s the highest-order ethical thinking in complex institutions.' };
  if (deep >= 5) return { icon: '⚖️', title: 'Principled Reasoner', subtitle: 'Strong ethical instincts with occasional pragmatic pulls.', blurb: 'Your reasoning was grounded and thoughtful, and you generally pushed past the surface choice. A few times, the immediate pragmatic solution pulled you away from the fuller picture. The difference between those two types of choices is usually visible in whether you asked whose burden was being shifted by your decision.' };
  if (deep >= 3) return { icon: '🧭', title: 'Developing Framework', subtitle: 'Solid intuitions, building toward systemic thinking.', blurb: 'You identified the right tensions in most scenarios but sometimes resolved them at the level that was least costly to you in the moment. That\'s very human. The skill being built here is the capacity to stay with discomfort long enough to reason through what the situation actually calls for — not just what it allows.' };
  return { icon: '📡', title: 'Signal Seeker', subtitle: 'You\'re picking up the frequency. Keep tuning.', blurb: 'The fact that you engaged with all eight scenarios honestly is itself the beginning of the practice. AI ethics is not a set of rules — it is a set of habits of mind. Coming back to these scenarios and playing again with a different role is one of the most useful things you can do right now.' };
}

function renderSummary() {
  phase = 'summary';
  renderPips();
  const persona = getPersona();
  const avgDepth = Math.round((stats.deepChoices / SCENARIOS.length) * 100);

  const logHtml = log.map(e => {
    const cls = e.depth === 'deep' ? 'badge-deep' : e.depth === 'mid' ? 'badge-mid' : 'badge-low';
    return `
      <div class="log-row">
        <div class="log-left">
          <div class="log-scenario">${e.who} · ${e.scenario}</div>
          <div class="log-choice">${e.choiceText}</div>
        </div>
        <div class="log-badge ${cls}">${e.label}</div>
      </div>`;
  }).join('');

  const glossaryHtml = VOCAB.map(v => `
    <div class="g-card">
      <div class="g-term">${v.term}</div>
      <div class="g-def">${v.defs.find(d => d.correct).text}</div>
    </div>`).join('');

  setMain(`
    <div class="card">
      <div class="summary-eyebrow">Signal Report</div>
      <div class="summary-persona-row">
        <div class="persona-icon-big">${persona.icon}</div>
        <div>
          <div class="summary-title">${persona.title}</div>
          <div class="summary-subtitle">${persona.subtitle}</div>
        </div>
      </div>
      <p class="summary-blurb">${persona.blurb}</p>
      <div class="depth-meter-wrap" style="margin-bottom:28px;">
        <div class="depth-meter-heads"><span>Surface reasoning</span><span>Deep reasoning</span></div>
        <div class="depth-track">
          <div class="depth-fill" id="summFill" style="width:0%;background:var(--amber);"></div>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-num">${stats.vocabCorrect}/8</div><div class="stat-label">Terms tuned</div></div>
        <div class="stat-card"><div class="stat-num">${stats.deepChoices}/8</div><div class="stat-label">Deep choices</div></div>
        <div class="stat-card"><div class="stat-num">${stats.reflections}</div><div class="stat-label">Reflections written</div></div>
      </div>
    </div>

    <div class="card">
      <div class="section-head">Case Log</div>
      <div class="case-log">${logHtml}</div>
      <div class="closing-note">
        The eight dilemmas in this game do not exhaust the AI ethics questions your school is currently navigating — they are a representative sample of the ones already in classrooms, staffrooms, and administrative offices. The vocabulary terms are the conceptual tools. The scenarios are what the tools are for. The goal is not to leave with the right answers. It is to leave better at asking the right questions before you make a decision that affects someone else.
      </div>
      <button class="restart-btn" onclick="restart()">Play again with a different role</button>
    </div>

    <div class="card">
      <div class="section-head">Full Glossary</div>
      <div class="glossary-grid">${glossaryHtml}</div>
    </div>
  `);

  requestAnimationFrame(() => {
    const fill = document.getElementById('summFill');
    if (fill) setTimeout(() => fill.style.width = avgDepth + '%', 100);
  });
}

function restart() {
  selectedRole = null;
  renderIntro();
}

// ─────────────────────────────────────────────
// KEYBOARD
// ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (phase === 'vocab' && !vocabAnswered) {
    const idx = ['1','2','3'].indexOf(e.key);
    if (idx !== -1) {
      const btns = document.querySelectorAll('.choice');
      if (btns[idx]) btns[idx].click();
    }
  } else if (phase === 'vocab' && vocabAnswered && e.key === 'Enter') {
    goToScenario();
  } else if (phase === 'scenario' && !scenarioAnswered) {
    const idx = ['1','2','3'].indexOf(e.key);
    if (idx !== -1) {
      const btns = document.querySelectorAll('.s-choice');
      if (btns[idx]) btns[idx].click();
    }
  } else if (phase === 'scenario' && scenarioAnswered && e.key === 'Enter') {
    const reflectBox = document.getElementById('reflectBox');
    if (document.activeElement !== reflectBox) nextRound();
  }
});

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
renderIntro();
</script>
</body>
</html>
